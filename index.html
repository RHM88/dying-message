<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content=\"yes\">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DYING MESSAGE — 소설가의 마지막 문장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{\n  --bg:#0d0f14;
  --surface:#13161d;
  --surface2:#1a1e28;
  --border:rgba(255,255,255,0.08);
  --gold:#c8a96e;
  --gold2:#e8c98e;
  --blue:#5a9fd4;
  --purple:#a070d0;
  --red:#d04040;
  --text:rgba(255,255,255,0.9);
}
body{
  background-color:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR', sans-serif;
  overflow:hidden;
  -webkit-user-select:none;
  user-select:none;
}
/* 공통 스크린 구조 */
.screen{
  position:absolute;
  top:0;left:0;width:100vw;height:100vh;
  display:flex;flex-direction:column;
  z-index:10;background-color:var(--bg);
}
.screen.hidden{display:none !important;}

/* 배경 미디어 레이어 스타일 */
.bg-media {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: 1; overflow: hidden;
}
.bg-media video, .bg-media img {
  width: 100%; height: 100%;
  object-fit: cover;
  pointer-events: none;
}

/* 타이틀 화면 콘텐츠 배치 조정 */
#title-screen .title-content {
  position: relative;
  z-index: 2;
  margin: auto;
  text-align: center;
  background: rgba(13, 15, 20, 0.75);
  padding: 40px;
  border-radius: 12px;
  border: 1px solid var(--border);
  backdrop-filter: blur(8px);
}
.main-title{
  font-family:'DM Serif Display', serif;
  font-size:48px;letter-spacing:4px;color:var(--gold);
  margin-bottom:8px;
}
.sub-title{
  font-family:'Nanum Myeongjo', serif;
  font-size:16px;letter-spacing:6px;color:rgba(255,255,255,0.5);
  margin-bottom:40px;
}

/* 인원수 선택 그리드 */
.setup-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  max-width:320px;margin:0 auto 30px auto;
}
.pbtn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:15px 0;font-size:16px;font-weight:700;
  border-radius:8px;cursor:pointer;transition:all 0.2s;
}
.pbtn.active{
  background:var(--gold);border-color:var(--gold);color:var(--bg);
}

/* 버튼 공통 */
.btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:14px 28px;font-size:16px;font-weight:700;
  border-radius:8px;cursor:pointer;transition:all 0.2s;
}
.btn-gold{background:var(--gold);color:var(--bg);border-color:var(--gold);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}

/* 게임 화면 기본 구성 */
#game-screen{padding:20px;display:flex;flex-direction:column;gap:16px;}
.game-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);padding-bottom:12px;}
.phase-badge{background:var(--purple);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.fail-tokens{display:flex;gap:6px;}
.token{width:16px;height:16px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);}
.token.filled{background:var(--red);border-color:var(--red);}

/* 힌트 패널 */
.hint-panel{
  display:flex;gap:10px;background:var(--surface);padding:12px;border-radius:8px;
  border:1px solid var(--border);overflow-x:auto;
}
.hint-tile{
  padding:8px 16px;border-radius:4px;font-size:14px;white-space:nowrap;
}
.hint-tile.adj{background:rgba(90,159,212,0.15);border:1px solid var(--blue);color:var(--blue);font-weight:900;}
.hint-tile.noun{background:rgba(208,64,64,0.15);border:1px solid var(--red);color:var(--red);font-family:'Nanum Myeongjo',serif;font-weight:800;letter-spacing:0.2em;}

/* 카드 레이아웃 영역 */
.card-area{
  flex:1;display:flex;flex-direction:column;gap:14px;overflow-y:auto;
}
.card-row{
  display:grid;grid-template-columns:repeat(5,1fr);gap:8px;
}
.gcard{
  background:var(--surface);border:1px solid var(--border);border-radius:6px;
  aspect-ratio:3/4;position:relative;overflow:hidden;cursor:pointer;
  display:flex;flex-direction:column;
}
.gcard.has-exclude{border-color:var(--red);opacity:0.5;}
.gcard.has-deduce{border-color:var(--gold);box-shadow:0 0 10px rgba(200,169,110,0.3);}
.gcard.ans-correct{border-color:#40d070;box-shadow:0 0 15px rgba(64,208,112,0.5);}

.gcard-art{width:100%;flex:1;position:relative;background:var(--surface2);overflow:hidden;}
.card-img{width:100%;height:100%;object-fit:cover;}
.card-fb{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:rgba(255,255,255,0.4);text-align:center;padding:4px;
}
.gcard-name{
  background:var(--surface);text-align:center;padding:6px 2px;
  font-size:12px;font-weight:700;border-top:1px solid var(--border);
}

/* 하단 인터랙션 패널 */
.bottom-panel{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:16px;display:flex;flex-direction:column;gap:12px;
}
.bp-row{display:flex;justify-content:space-between;align-items:center;}
.bp-msg{font-size:14px;color:rgba(255,255,255,0.7);}

/* 추리 모드 레이아웃 */
.final-deduce-layout{display:flex;flex-direction:column;gap:10px;}
.final-row{display:flex;align-items:center;gap:10px;overflow-x:auto;padding-bottom:4px;}
.final-cat{font-size:12px;font-weight:700;color:var(--gold);width:40px;flex-shrink:0;}
.fsel-btn{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  padding:6px 12px;font-size:12px;border-radius:4px;white-space:nowrap;cursor:pointer;
}
.fsel-btn.chosen{background:var(--gold);color:var(--bg);border-color:var(--gold);}

/* 모달 스타일 */
.modal-ov{
  position:fixed;top:0;left:0;width:100vw;height:100vh;
  background:rgba(5,7,10,0.85);backdrop-filter:blur(6px);
  z-index:100;display:flex;align-items:center;justify-content:center;
}
.modal-ov.hidden{display:none !important;}
.modal-content{
  background:var(--surface);border:1px solid var(--gold);padding:30px;
  border-radius:12px;width:90%;max-width:400px;text-align:center;
}
#m-icon{font-size:40px;margin-bottom:12px;}
#m-title{font-size:20px;color:var(--gold);font-weight:700;margin-bottom:10px;}
#m-body{font-size:14px;color:rgba(255,255,255,0.7);margin-bottom:24px;line-height:1.5;}
#m-btns{display:flex;gap:10px;justify-content:center;}

@media (max-width: 768px) {
  .card-row { gap: 6px; }
  .gcard-name { font-size: 10px; padding: 4px 1px; }
}
</style>
</head>
<body>

<div id="title-screen" class="screen">
  <div class="bg-media">
    <video id="bg-video" src="images/bg/default.webm" autoplay loop muted playsinline></video>
  </div>
  
  <div class="title-content">
    <div class="main-title">DYING MESSAGE</div>
    <div class="sub-title">소설가의 마지막 문장</div>
    
    <div class="setup-grid">
      <button class="pbtn" onclick="selectPlayerCount(2)">2인</button>
      <button class="pbtn" onclick="selectPlayerCount(3)">3인</button>
      <button class="pbtn" onclick="selectPlayerCount(4)">4인</button>
      <button class="pbtn" onclick="selectPlayerCount(5)">5인</button>
      <button class="pbtn" onclick="selectPlayerCount(6)">6인</button>
      <button class="pbtn" onclick="selectPlayerCount(null)">초기화</button>
    </div>
    
    <button id="start-btn" class="btn btn-gold" onclick="startGame()" disabled>게임 시작</button>
  </div>
</div>

<div id="game-screen" class="screen hidden">
  <div class="game-header">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="phase-badge" id="phase-txt">힌트 페이즈</span>
      <span id="round-txt" style="font-size:14px;font-weight:700;">라운드 1/4</span>
    </div>
    <div class="fail-tokens" id="tokens-area">
      <div class="token"></div>
      <div class="token"></div>
      <div class="token"></div>
    </div>
  </div>

  <div class="hint-panel" id="hint-area">
    </div>

  <div class="card-area" id="card-board">
    </div>

  <div class="bottom-panel" id="action-panel">
    </div>
</div>

<div id="modal" class="modal-ov hidden">
  <div class="modal-content">
    <div id="m-icon">🔍</div>
    <div id="m-title">알림</div>
    <div id="m-body">내용</div>
    <div id="m-btns"></div>
  </div>
</div>

<script>
// ══════ GAME STATE ══════
let G = {
  playerCount: null,
  currentPhase: 'setup',
  round: 1,
  fails: 0,
  maxFails: 3,
  hints: [
    {type:'adj', text:'차가운'},
    {type:'noun', text:'발자국'}
  ],
  // 테스트용 가상 데이터셋
  suspects: ['의사', '비서', '정원사', '운전기사', '요리사'],
  tools: ['독약', '단도', '권총', '둔기', '밧줄'],
  motives: ['원한', '치정', '금전', '우발', '비밀'],
  
  // 상태 토큰 기록용
  excluded: [],
  deduced: [],
  deduceTokens: {s:null, t:null, m:null},
  
  // 정답 세팅 (임시 정답 설정)
  answer: {s:'의사', t:'독약', m:'원한'}
};

// ══════ SYSTEM / SETUP LOGIC ══════

// 수정포인트: 인원수 버튼을 선택할 때 배경 비디오 src를 올바른 경로의 webm으로 변경하는 핵심 함수 구현
function selectPlayerCount(count) {
  G.playerCount = count;
  
  // 버튼 클래스 활성화 상태 제어
  const buttons = document.querySelectorAll('.pbtn');
  buttons.forEach(btn => btn.classList.remove('active'));
  
  const bgVideo = document.getElementById('bg-video');
  
  if(count) {
    // 특정 인원 버튼 클릭 시 작동하는 클래스 토글링
    event.target.classList.add('active');
    document.getElementById('start-btn').disabled = false;
    
    // 주소 합성 시 대소문자 엄격 일치 및 상대 경로 슬래시 적용
    if (bgVideo) {
      bgVideo.src = `images/bg/${count}p.webm`;
      bgVideo.load();
      bgVideo.play().catch(e => console.log("비디오 재생 불가:", e));
    }
  } else {
    // 초기화 버튼 클릭 시 default 파일로 원복
    document.getElementById('start-btn').disabled = true;
    if (bgVideo) {
      bgVideo.src = "images/bg/default.webm";
      bgVideo.load();
      bgVideo.play().catch(e => console.log("비디오 원복 재생 실패:", e));
    }
  }
}

function startGame() {
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  G.currentPhase = 'hint';
  initGameLayout();
}

function initGameLayout() {
  renderHeaders();
  renderHints();
  renderCards();
  renderBottomPanel();
}

function renderHeaders() {
  document.getElementById('phase-txt').textContent = G.currentPhase === 'hint' ? '힌트/제외 페이즈' : '최종 추리 페이즈';
  document.getElementById('round-txt').textContent = `라운드 ${G.round}/4`;
  
  const tokens = document.getElementById('tokens-area').children;
  for(let i=0; i<tokens.length; i++) {
    if(i < G.fails) tokens[i].classList.add('filled');
    else tokens[i].classList.remove('filled');
  }
}

function renderHints() {
  const area = document.getElementById('hint-area');
  area.innerHTML = G.hints.map(h => `
    <div class="hint-tile ${h.type}">${h.text}</div>
  `).join('');
}

// ══════ CARD RENDER LOGIC (우선순위 대응) ══════

// 수정포인트: 카드를 그릴 때 webm -> mp4 -> png 순서로 미디어를 안전하게 탐색하는 연출 로직 설계
function getCardMediaHTML(name, type) {
  const folder = `images/${type}`;
  // 한글 파일명이 웹 서버에서 깨지지 않도록 퍼센트 인코딩 안전 장치 추가
  const safeName = encodeURIComponent(name); 

  return `
    <div class="gcard-art">
      <video autoplay loop muted playsinline class="card-img" style="width:100%; height:100%; object-fit:cover;">
        <source src="${folder}/${safeName}.webm" type="video/webm">
        <source src="${folder}/${safeName}.mp4" type="video/mp4">
        <img src="${folder}/${safeName}.png" alt="${name}" class="card-img" onerror="this.style.opacity='0';">
      </video>
      <div class="card-fb">${name}</div>
    </div>
  `;
}

function renderCards() {
  const board = document.getElementById('card-board');
  board.innerHTML = '';

  // 1. 용의자 라인 출력
  let sRow = `<div class="card-row">`;
  G.suspects.forEach(s => {
    const isEx = G.excluded.includes(s);
    const isDe = G.deduceTokens.s === s;
    const isCorr = (G.currentPhase==='end' && G.answer.s === s);
    sRow += `
      <div class="gcard ${isEx?'has-exclude':''} ${isDe?'has-deduce':''} ${isCorr?'ans-correct':''}" onclick="handleCardClick('${s}', 'suspect')">
        ${getCardMediaHTML(s, 'suspect')}
        <div class="gcard-name">${s}</div>
      </div>
    `;
  });
  sRow += `</div>`;

  // 2. 도구 라인 출력
  let tRow = `<div class="card-row">`;
  G.tools.forEach(t => {
    const isEx = G.excluded.includes(t);
    const isDe = G.deduceTokens.t === t;
    const isCorr = (G.currentPhase==='end' && G.answer.t === t);
    tRow += `
      <div class="gcard ${isEx?'has-exclude':''} ${isDe?'has-deduce':''} ${isCorr?'ans-correct':''}" onclick="handleCardClick('${t}', 'tool')">
        ${getCardMediaHTML(t, 'tool')}
        <div class="gcard-name">${t}</div>
      </div>
    `;
  });
  tRow += `</div>`;

  // 3. 동기 라인 출력
  let mRow = `<div class="card-row">`;
  G.motives.forEach(m => {
    const isEx = G.excluded.includes(m);
    const isDe = G.deduceTokens.m === m;
    const isCorr = (G.currentPhase==='end' && G.answer.m === m);
    mRow += `
      <div class="gcard ${isEx?'has-exclude':''} ${isDe?'has-deduce':''} ${isCorr?'ans-correct':''}" onclick="handleCardClick('${m}', 'motive')">
        ${getCardMediaHTML(m, 'motive')}
        <div class="gcard-name">${m}</div>
      </div>
    `;
  });
  mRow += `</div>`;

  board.innerHTML = sRow + tRow + mRow;
}

function handleCardClick(name, type) {
  if(G.currentPhase === 'end') return;
  
  // 이미 제외된 카드는 토글로 해제 가능하도록 예시 구성
  if(G.excluded.includes(name)) {
    G.excluded = G.excluded.filter(item => item !== name);
  } else {
    G.excluded.push(name);
  }
  renderCards();
}

// ══════ BOTTOM PANEL & RULES LOGIC ══════
function renderBottomPanel() {
  const panel = document.getElementById('action-panel');
  
  if(G.currentPhase === 'hint') {
    panel.innerHTML = `
      <div class="bp-row">
        <span class="bp-msg">알리바이가 증명된 단서를 클릭하여 보드에서 제외시키세요.</span>
        <button class="btn btn-gold" onclick="switchDeducePhase()">최종 추리 모드로</button>
      </div>
    `;
  } else if(G.currentPhase === 'deduce') {
    const remS = G.suspects.filter(c=>!G.excluded.includes(c));
    const remT = G.tools.filter(c=>!G.excluded.includes(c));
    const remM = G.motives.filter(c=>!G.excluded.includes(c));
    
    const ready = G.deduceTokens.s && G.deduceTokens.t && G.deduceTokens.m;
    
    panel.innerHTML = `
      <div class="final-deduce-layout">
        <div class="final-row">
          <span class="final-cat">범인</span>
          ${remS.map(c=>`<button class="fsel-btn${G.deduceTokens.s===c?' chosen':''}\" onclick=\"G.deduceTokens.s='${c}';renderCards();renderBottomPanel();\">${c}</button>`).join('')}
        </div>
        <div class="final-row">
          <span class="final-cat">도구</span>
          ${remT.map(c=>`<button class="fsel-btn${G.deduceTokens.t===c?' chosen':''}\" onclick=\"G.deduceTokens.t='${c}';renderCards();renderBottomPanel();\">${c}</button>`).join('')}
        </div>
        <div class="final-row">
          <span class="final-cat">동기</span>
          ${remM.map(c=>`<button class="fsel-btn${G.deduceTokens.m===c?' chosen':''}\" onclick=\"G.deduceTokens.m='${c}';renderCards();renderBottomPanel();\">${c}</button>`).join('')}
        </div>
        <div class="bp-row" style="margin-top:4px;">
          <span class="bp-msg" style="font-size:12px;">${ready?'✓ 준비 완료 — 제출하세요':'범인, 도구, 동기를 모두 선택하세요'}</span>
          <button class="btn btn-gold" onclick="submitDeduce()" ${ready?'':'disabled'}>최종 추리 제출!</button>
        </div>
      </div>
    `;
  }
}

function switchDeducePhase() {
  G.currentPhase = 'deduce';
  renderHeaders();
  renderBottomPanel();
}

function submitDeduce() {
  const sMatch = G.deduceTokens.s === G.answer.s;
  const tMatch = G.deduceTokens.t === G.answer.t;
  const mMatch = G.deduceTokens.m === G.answer.m;
  
  if(sMatch && tMatch && mMatch) {
    G.currentPhase = 'end';
    renderCards();
    showModal('🎉', '사건 해결 완료', '탐정단이 완벽하게 소설가의 마지막 문장을 해석하여 범인을 체포했습니다!', [{l:'다시 시작하기', c:'btn-gold', a:'restart'}]);
  } else {
    G.fails++;
    renderHeaders();
    if(G.fails >= G.maxFails) {
      G.currentPhase = 'end';
      renderCards();
      showModal('☠️', '수사 실패 (게임 오버)', `범인 검거에 실패했습니다.<br>정답은 <b>[범인: ${G.answer.s}, 도구: ${G.answer.t}, 동기: ${G.answer.m}]</b> 이었습니다.`, [{l:'다시 도전', c:'btn-gold', a:'restart'}]);
    } else {
      showModal('❌', '추리 실패', '선택한 정보 중 무언가 잘못되었습니다. 단서 토큰 1개가 차감됩니다.', [{l:'다시 확인', c:'', a:'close'}]);
      G.currentPhase = 'hint';
      G.round++;
      if(G.round > 4) {
        G.currentPhase = 'end';
        showModal('⏳', '시간 초과', '4 라운드가 지나 작가가 사망에 이르렀습니다.', [{l:'다시 시작', c:'btn-gold', a:'restart'}]);
      }
      initGameLayout();
    }
  }
}

// ══════ MODAL ══════
function showModal(icon,title,body,btns){
  document.getElementById('m-icon').textContent=icon;
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-body').innerHTML=body;
  document.getElementById('m-btns').innerHTML=btns.map(b=>
    `<button class="btn ${b.c}" onclick="mAct('${b.a}')">${b.l}</button>`
  ).join('');
  document.getElementById('modal').classList.remove('hidden');
}

function mAct(a){
  document.getElementById('modal').classList.add('hidden');
  if(a==='close')return;
  if(a==='restart'){
    G.playerCount = null;
    G.currentPhase = 'setup';
    G.round = 1;
    G.fails = 0;
    G.excluded = [];
    G.deduced = [];
    G.deduceTokens = {s:null, t:null, m:null};
    
    document.getElementById('game-screen').classList.add('hidden');
    document.getElementById('title-screen').classList.remove('hidden');
    const buttons = document.querySelectorAll('.pbtn');
    buttons.forEach(btn => btn.classList.remove('active'));
    document.getElementById('start-btn').disabled = true;
    
    const bgVideo = document.getElementById('bg-video');
    if (bgVideo) {
      bgVideo.src = "images/bg/default.webm";
      bgVideo.load();
    }
  }
}
</script>
</body>
</html>
