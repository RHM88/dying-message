<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DYING MESSAGE — 소설가의 마지막 문장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0f14;
  --surface:#13161d;
  --surface2:#1a1e28;
  --border:rgba(255,255,255,0.08);
  --gold:#c8a96e;
  --gold2:#e8c98e;
  --blue:#5a9fd4;
  --purple:#a070d0;
  --red:#d04040;
  --text:rgba(255,255,255,0.9);
  --text2:rgba(255,255,255,0.5);
  --text3:rgba(255,255,255,0.25);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;}
#app{min-height:100vh;}

/* ─── SCREENS ─── */
.screen{display:none;}
.screen.active{display:flex;}

/* ─── TITLE ─── */
#title-screen{
  flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:32px 20px;gap:28px;
  position:relative;overflow:hidden;
}
/* 배경 video/img 공통 */
.bg-media{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;z-index:0;pointer-events:none;
}
#title-screen::before{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0.62);
  backdrop-filter:blur(1px);
  z-index:0;
}
#title-screen > *{position:relative;z-index:1;}
#bg-container{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.title-eyebrow{font-size:10px;letter-spacing:6px;color:var(--text3);font-weight:300;}
.title-main{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,12vw,96px);color:#fff;letter-spacing:6px;line-height:0.9;text-align:center;}
.title-sub{font-family:'DM Serif Display',serif;font-style:italic;font-size:15px;color:var(--gold);letter-spacing:2px;margin-top:4px;}
.title-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:4px auto;}

.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:400px;display:flex;flex-direction:column;gap:20px;}
.setup-label{font-size:10px;letter-spacing:3px;color:var(--text3);text-align:center;}

  /* ── 카드 뷰어 ── */
  .cv-toggle{background:none;border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:11px;color:var(--text2);cursor:pointer;letter-spacing:1px;display:flex;align-items:center;gap:6px;margin:0 auto;transition:all .2s;}
  .cv-toggle:hover{border-color:var(--gold);color:var(--gold);}
  .cv-panel{display:none;flex-direction:column;gap:14px;animation:fadeIn .25s ease;}
  .cv-panel.open{display:flex;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
  .cv-tabs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
  .cv-tab{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:10px;letter-spacing:1px;color:var(--text2);cursor:pointer;transition:all .2s;}
  .cv-tab.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;}
  /* ── 카드 뷰어 콘텐츠 ── */
  .cv-content{display:none;}
  .cv-content.active{display:flex;gap:10px;padding:8px 4px;
    overflow-x:auto;overflow-y:hidden;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
  }
  .cv-content::-webkit-scrollbar{height:4px;}
  .cv-content::-webkit-scrollbar-track{background:transparent;}
  .cv-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  /* ── 카드 슬라이드 아이템 (용의자/도구/동기) ── */
  .cv-card-item{
    flex-shrink:0;scroll-snap-align:start;
    display:flex;flex-direction:column;align-items:center;gap:0;
    cursor:pointer;
  }
  .cv-card-thumb{
    width:88px;height:130px;border-radius:10px;overflow:hidden;
    background:var(--surface2);border:1px solid var(--border);
    position:relative;display:flex;align-items:center;justify-content:center;
    transition:transform .15s,border-color .15s,box-shadow .15s;
  }
  .cv-card-item:hover .cv-card-thumb,
  .cv-card-item:active .cv-card-thumb{
    transform:scale(1.05);border-color:var(--gold);
    box-shadow:0 6px 20px rgba(0,0,0,0.5);
  }
  .cv-card-thumb img{
    position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;object-position:top center;display:block;
  }
  .cv-card-thumb .cv-card-fb{
    position:relative;z-index:1;
    font-size:12px;color:var(--text2);text-align:center;
    padding:8px;line-height:1.4;font-weight:700;
  }
  .cv-card-thumb .cv-card-badge{
    position:absolute;top:5px;right:5px;
    font-size:7px;padding:2px 5px;border-radius:4px;
    font-weight:700;letter-spacing:.3px;z-index:2;
  }
  .cv-card-badge.big-badge{background:rgba(90,159,212,0.9);color:#fff;}

  /* ── 타일 그리드 (형용사/명사) ── */
  .cv-content.tile-grid{
    display:none;
    flex-wrap:wrap;
    gap:6px;
    padding:8px 4px;
    overflow-x:hidden;
    overflow-y:auto;
    max-height:280px;
    justify-content:flex-start;
    scroll-snap-type:none;
  }
  .cv-content.tile-grid.active{display:flex;}
  .cv-tile-item{
    display:flex;align-items:center;justify-content:center;
    cursor:default;
  }
  .cv-tile-thumb{
    position:relative;overflow:hidden;
    width:82px;height:38px;border-radius:6px;
    background:var(--surface2);
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s, box-shadow .12s;
  }
  .cv-tile-thumb.sel{
    box-shadow:0 0 0 2px var(--gold);
    transform:translateY(-3px) scale(1.06);
  }
  .cv-tile-thumb img.tile-bg{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  }
  /* 형용사 — Noto Sans KR 고딕, 파란색, 굵게 */
  .cv-tile-thumb.adj-tile .tile-text{
    position:relative;z-index:1;
    font-family:'Noto Sans KR',sans-serif;
    font-weight:900;font-size:13px;
    color:#3a6fbf;
    letter-spacing:0.05em;
    text-shadow:none;
  }
  /* 명사 — Nanum Myeongjo 바탕체, 붉은색, 왼쪽정렬, 넓은자간 */
  .cv-tile-thumb.noun-tile .tile-text{
    position:relative;z-index:1;
    font-family:'Nanum Myeongjo',serif;
    font-weight:700;font-size:12px;
    color:#c0392b;
    letter-spacing:0.8em;
    text-align:left;
    text-shadow:none;
    padding-left:22px;
    white-space:nowrap;
  }
  .cv-legend{display:flex;gap:10px;justify-content:center;font-size:9px;color:var(--text3);flex-wrap:wrap;margin-top:-4px;}
  .cv-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle;}
  .cv-dot.base{background:rgba(200,169,110,0.6);}
  .cv-dot.big{background:rgba(90,159,212,0.6);}
  .cv-dot.adj{background:rgba(80,200,120,0.6);}
  .cv-dot.noun{background:rgba(200,100,100,0.6);}

  /* ── 카드 뷰어 독립 박스 ── */
  .cv-box{
    width:100%;max-width:400px;
    background:var(--surface);
    border:1px solid rgba(200,169,110,0.35);
    border-radius:16px;
    overflow:hidden;
    transition:border-color .2s;
  }
  .cv-box:hover{border-color:rgba(200,169,110,0.6);}
  .cv-box-header{
    width:100%;background:none;border:none;
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px;cursor:pointer;gap:14px;
  }
  .cv-box-left{display:flex;align-items:center;gap:12px;}
  .cv-box-icon-wrap{
    width:38px;height:38px;border-radius:10px;
    background:rgba(200,169,110,0.12);
    display:flex;align-items:center;justify-content:center;
    font-size:18px;flex-shrink:0;
  }
  .cv-box-title{font-size:13px;font-weight:700;color:var(--gold);letter-spacing:.5px;text-align:left;}
  .cv-box-desc{font-size:10px;color:var(--text3);letter-spacing:.5px;text-align:left;margin-top:2px;}
  .cv-box-arrow{
    font-size:20px;color:var(--gold2);transition:transform .3s;
    flex-shrink:0;line-height:1;
  }
  .cv-box-arrow.open{transform:rotate(90deg);}
  .cv-panel{padding:0 16px 16px;display:none;flex-direction:column;gap:12px;}
  .cv-panel.open{display:flex;}
.player-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.pbtn{
  aspect-ratio:1;border:1px solid var(--border);border-radius:10px;
  background:var(--surface2);color:var(--text2);font-size:18px;font-weight:700;
  cursor:pointer;transition:all 0.2s;font-family:'Noto Sans KR',sans-serif;
}
.pbtn:hover{border-color:var(--blue);color:var(--blue);}
.pbtn.sel{border-color:var(--gold);color:var(--gold);background:rgba(200,169,110,0.1);box-shadow:0 0 16px rgba(200,169,110,0.15);}

.role-preview{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.role-chip{font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);color:var(--text3);transition:all 0.3s;}
.role-chip.novelist{border-color:rgba(90,159,212,0.4);color:var(--blue);}
.role-chip.accomplice{border-color:rgba(160,112,208,0.4);color:var(--purple);}
.role-chip.detective{border-color:rgba(200,169,110,0.4);color:var(--gold);}

.start-btn{
  padding:16px;border-radius:12px;border:none;font-size:15px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.25s;letter-spacing:1px;
  background:linear-gradient(135deg,#b8994e,#d4b87e);color:#0d0f14;
  opacity:0.35;pointer-events:none;
}
.start-btn.ready{opacity:1;pointer-events:auto;}
.start-btn.ready:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,169,110,0.3);}

/* ─── ROLE REVEAL ─── */
#role-screen{
  flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:32px 20px;gap:24px;
  background:radial-gradient(ellipse at center,rgba(30,50,80,0.3) 0%,var(--bg) 70%);
}
.role-step{font-size:10px;letter-spacing:4px;color:var(--text3);}
.role-card{
  background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:36px 32px;max-width:320px;width:100%;text-align:center;
  position:relative;overflow:hidden;
}
.role-card-img{
  width:100%;border-radius:12px;overflow:hidden;
  background:var(--surface2);margin-bottom:16px;
}
.role-card-img img{width:100%;height:auto;display:block;object-fit:contain;}
.role-card-img .role-img-fb{font-size:48px;display:flex;align-items:center;justify-content:center;min-height:120px;}
.role-card-img{
  width:100%;border-radius:12px;overflow:hidden;
  background:var(--surface2);margin-bottom:16px;
}
.role-card-img img{width:100%;height:auto;display:block;object-fit:contain;}
.role-card-img .role-img-fb{font-size:48px;display:flex;align-items:center;justify-content:center;min-height:120px;}
.role-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--accent-color,var(--gold));
}
.role-icon{font-size:56px;margin-bottom:16px;display:block;}
.role-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;color:var(--accent-color,var(--gold));}
.role-desc{font-size:12px;color:var(--text2);line-height:1.8;margin-top:10px;}
.role-secret{
  margin-top:16px;padding:12px;border-radius:10px;
  background:rgba(200,169,110,0.06);border:1px solid rgba(200,169,110,0.2);
  font-size:11px;color:var(--gold);line-height:1.8;
}
.role-secret strong{font-weight:900;}
.role-occupation{
  margin-top:12px;padding:10px;border-radius:8px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  font-size:11px;color:var(--text2);
}
.role-occupation strong{color:var(--text);}

.next-btn{
  padding:14px 40px;border-radius:12px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text);font-size:13px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;letter-spacing:1px;
}
.next-btn:hover{border-color:var(--gold);color:var(--gold);}
.next-btn.primary{background:linear-gradient(135deg,#b8994e,#d4b87e);color:#0d0f14;border:none;}
.next-btn.primary:hover{transform:translateY(-2px);}

/* ─── GAME BOARD ─── */
#game-screen{
  flex-direction:column;min-height:100vh;
  background:radial-gradient(ellipse at 20% 10%,rgba(30,60,100,0.2) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 90%,rgba(100,50,30,0.15) 0%,transparent 50%),
             var(--bg);
}

.game-header{
  position:sticky;top:0;z-index:50;
  background:rgba(13,15,20,0.92);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.phase-badge{
  font-size:9px;letter-spacing:2px;font-weight:700;
  padding:4px 12px;border-radius:20px;
}
.phase-hint{background:rgba(90,159,212,0.15);color:var(--blue);border:1px solid rgba(90,159,212,0.3);}
.phase-exclude{background:rgba(208,64,64,0.15);color:var(--red);border:1px solid rgba(208,64,64,0.3);}
.phase-deduce{background:rgba(200,169,110,0.15);color:var(--gold);border:1px solid rgba(200,169,110,0.3);}
.phase-final{background:rgba(160,112,208,0.15);color:var(--purple);border:1px solid rgba(160,112,208,0.3);}

.round-badge{font-size:9px;letter-spacing:2px;padding:4px 12px;border-radius:20px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.header-sep{flex:1;}
.fail-tokens{display:flex;gap:4px;align-items:center;}
.fail-tok{
  width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);
  transition:all 0.4s;
}
.fail-tok.used{background:var(--red);border-color:#e06060;color:#fff;}

/* ─── BOARD LAYOUT ─── */
.board-body{
  display:flex;flex-direction:column;
  flex:1;min-height:0;
}

/* LEFT: card rows */
.card-area{padding:12px;display:flex;flex-direction:column;gap:12px;}
.row-section{display:flex;flex-direction:column;gap:6px;}
.row-header{
  display:flex;align-items:center;gap:8px;
  font-size:8px;letter-spacing:3px;color:var(--text3);
}
.row-type-dot{width:6px;height:6px;border-radius:50%;}
.dot-s{background:var(--blue);}
.dot-t{background:var(--red);}
.dot-m{background:var(--gold);}
.dot-a{background:var(--purple);}
.card-row{display:flex;gap:6px;flex-wrap:wrap;}

/* CARDS */
.gcard{
  width:80px;border-radius:10px;overflow:hidden;cursor:pointer;
  border:1.5px solid var(--border);background:var(--surface);
  transition:all 0.15s;position:relative;flex-shrink:0;
}
.gcard:hover:not(.elim):not(.disabled){
  border-color:rgba(255,255,255,0.35);transform:translateY(-3px);
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
}
.gcard.elim{opacity:0.15;filter:grayscale(1);cursor:default;pointer-events:none;}
.gcard.disabled{cursor:default;}

/* token states */
.gcard.has-exclude{border-color:var(--red);box-shadow:0 0 10px rgba(208,64,64,0.3);}
.gcard.has-deduce{border-color:var(--gold);box-shadow:0 0 10px rgba(200,169,110,0.3);}
.gcard.sel-exclude{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),0 0 12px rgba(200,169,110,0.4);}
.gcard.selected{border-color:#fff;box-shadow:0 0 14px rgba(255,255,255,0.2);}
.gcard.ans-correct{border-color:#50e090;}

.gcard-art{
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.1);position:relative;
  overflow:hidden;
}
.gcard-art img.card-img{
  width:100%;height:auto;display:block;
  object-fit:contain;
}
.gcard-art .card-fb{
  position:relative;z-index:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:2px;
  width:100%;height:100%;
  font-size:11px;color:var(--text2);font-weight:700;
  text-align:center;padding:4px;
}

/* ── 힌트 타일 (형용사/명사) ── */
.hint-tile{
  display:inline-flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  border-radius:6px;padding:0;
  min-width:52px;height:26px;
}
.hint-tile img.tile-bg{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;
}
.hint-tile .tile-text{
  position:relative;z-index:1;
  font-size:10px;font-weight:700;
  letter-spacing:0.03em;
  text-shadow:0 1px 3px rgba(0,0,0,0.7);
  padding:0 6px;white-space:nowrap;
}
.hint-tile.adj .tile-text{
  font-family:'Noto Sans KR',sans-serif;
  color:#7ec8ff;
}
.hint-tile.noun .tile-text{
  font-family:'Nanum Myeongjo',serif;
  color:#ffaaaa;
}

/* ── cv-chip 이미지 ── */
.cv-chip-img{
  width:32px;height:40px;border-radius:4px;
  object-fit:cover;display:block;flex-shrink:0;
}
.cv-chip-fb{
  width:32px;height:40px;border-radius:4px;
  background:var(--surface2);display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0;
}
.cv-chip{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:5px 10px 5px 5px;
  font-size:11px;color:var(--text);white-space:nowrap;
}
.cv-chip.big{border-color:rgba(90,159,212,0.4);background:rgba(90,159,212,0.07);}

/* ── cv-chip 타일형 (형용사/명사) ── */
.cv-chip.tile-adj,.cv-chip.tile-noun{
  position:relative;overflow:hidden;
  width:72px;height:40px;
  border-radius:8px;padding:0;
  justify-content:center;align-items:center;
  border:none;background:var(--surface2);
}
.cv-chip.tile-adj img.tile-bg,
.cv-chip.tile-noun img.tile-bg{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;
}
.cv-chip.tile-adj .tile-text{
  position:relative;z-index:1;
  font-family:'Noto Sans KR',sans-serif;
  font-weight:700;font-size:10px;
  color:#7ec8ff;
  text-shadow:0 1px 3px rgba(0,0,0,0.8);
  letter-spacing:0.05em;
}
.cv-chip.tile-noun .tile-text{
  position:relative;z-index:1;
  font-family:'Nanum Myeongjo',serif;
  font-weight:700;font-size:10px;
  color:#ffaaaa;
  text-shadow:0 1px 3px rgba(0,0,0,0.8);
  letter-spacing:0.05em;
}
.gcard-badge{display:none;display:none;
  position:absolute;top:3px;right:3px;font-size:6px;padding:1px 4px;
  border-radius:3px;font-weight:700;letter-spacing:0.5px;
}
.badge-s{background:rgba(40,80,140,0.9);color:#90c0f0;}
.badge-t{background:rgba(120,30,30,0.9);color:#f09090;}
.badge-m{background:rgba(100,80,20,0.9);color:#e0c070;}
.gcard-name{display:none;}

/* hint tiles on card */
.gcard-hints{display:none;display:none;
  display:flex;flex-direction:column;gap:2px;
  padding:3px 4px;background:rgba(0,0,0,0.2);
  border-top:1px solid var(--border);min-height:0;
}
.hint-pair{
  display:flex;gap:2px;
  font-size:7px;color:var(--gold);line-height:1.3;
}
.hint-word{
  background:rgba(200,169,110,0.1);border:0.5px solid rgba(200,169,110,0.25);
  border-radius:3px;padding:1px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
}

/* token overlays on card */
.card-tokens-overlay{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;gap:2px;justify-content:center;padding:2px;
  background:rgba(0,0,0,0.5);flex-wrap:wrap;
}
.mini-tok{
  width:12px;height:12px;border-radius:50%;border:1px solid;
  display:flex;align-items:center;justify-content:center;font-size:6px;
}
.mini-tok.excl{border-color:var(--red);color:var(--red);}
.mini-tok.ded{border-color:var(--gold);color:var(--gold);}
.mini-tok.fail-tok-card{background:var(--red);border-color:#e06060;color:#fff;}

/* TOP: hint panel — 가로 띠 */
.hint-panel{
  position:sticky;top:45px;z-index:40;
  background:rgba(10,12,18,0.95);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
  padding:8px 16px;
  display:flex;flex-direction:row;align-items:flex-start;gap:0;
  overflow-x:auto;
}
.hp-section{
  display:flex;flex-direction:column;gap:4px;
  flex:1;min-width:0;padding:0 12px;
}
.hp-section:first-child{padding-left:0;}
.hp-sep{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;margin:2px 0;}
.hp-label{
  font-size:7px;letter-spacing:2px;color:var(--text3);
  padding-bottom:3px;border-bottom:1px solid var(--border);
  white-space:nowrap;
}
.hp-slots{display:flex;flex-direction:row;flex-wrap:wrap;gap:3px;}
.hp-slot{
  font-size:8px;padding:3px 7px;border-radius:4px;
  border:1px solid var(--border);background:var(--surface2);
  color:var(--text3);display:flex;align-items:center;
  line-height:1.3;white-space:nowrap;
}
.hp-tile{
  position:relative;display:flex;align-items:center;justify-content:center;
  flex:1;height:100%;border-radius:4px;overflow:hidden;cursor:pointer;
  background:var(--surface2);min-height:22px;
}
.hp-tile.pending{opacity:0.75;}
.hp-tile.empty-tile{background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.1);}
.hp-slot.filled{
  border-color:rgba(200,169,110,0.3);color:var(--gold);
  background:rgba(200,169,110,0.06);
}
.hp-slot.acc.filled{border-color:rgba(160,112,208,0.3);color:var(--purple);background:rgba(160,112,208,0.06);}
.hp-slot.empty{color:var(--text3);opacity:0.35;font-size:7px;}
/* ─── BOTTOM PANEL ─── */
.bottom-panel{
  position:sticky;bottom:0;z-index:40;
  background:rgba(13,15,20,0.97);border-top:1px solid var(--border);
  backdrop-filter:blur(8px);padding:12px 16px;
  display:flex;flex-direction:column;gap:8px;
}
.bp-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.bp-title{font-size:9px;letter-spacing:2px;color:var(--text3);}
.bp-msg{font-size:11px;color:var(--text2);flex:1;line-height:1.5;}
.bp-msg strong{color:var(--text);}

/* tile rows */
.tiles-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.tile-label{font-size:8px;color:var(--text3);letter-spacing:1px;min-width:28px;}
.tile{
  padding:5px 10px;border-radius:20px;font-size:10px;cursor:pointer;
  transition:all 0.15s;border:1px solid;font-weight:500;
}
.tile.adj{background:rgba(30,55,90,0.6);border-color:rgba(80,140,210,0.3);color:#80b0e0;}
.tile.noun{background:rgba(70,25,25,0.6);border-color:rgba(180,80,80,0.3);color:#e08080;}
.tile.used{opacity:0.18;cursor:default;pointer-events:none;}
.tile.sel{border-color:var(--gold);color:var(--gold);background:rgba(200,169,110,0.12);}
.tile.adj:hover:not(.used):not(.sel){border-color:rgba(80,140,210,0.7);}
.tile.noun:hover:not(.used):not(.sel){border-color:rgba(180,80,80,0.7);}

/* buttons */
.btn{
  padding:10px 20px;border-radius:10px;border:none;font-size:12px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;letter-spacing:0.5px;
  white-space:nowrap;
}
.btn:disabled{opacity:0.3;cursor:not-allowed;}
.btn-gold{background:linear-gradient(135deg,#b8994e,#d4b87e);color:#0d0f14;}
.btn-gold:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px rgba(200,169,110,0.3);}
.btn-dark{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-dark:hover:not(:disabled){border-color:rgba(255,255,255,0.25);}
.btn-red{background:rgba(208,64,64,0.2);color:var(--red);border:1px solid rgba(208,64,64,0.3);}
.btn-red:hover:not(:disabled){background:rgba(208,64,64,0.3);}
.btn-blue{background:rgba(90,159,212,0.2);color:var(--blue);border:1px solid rgba(90,159,212,0.3);}
.btn-blue:hover:not(:disabled){background:rgba(90,159,212,0.3);}

/* final phase */
.final-rows{display:flex;flex-direction:column;gap:6px;width:100%;}
.final-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.final-cat{font-size:9px;letter-spacing:1px;color:var(--text3);min-width:36px;}
.fsel-btn{
  padding:5px 10px;border-radius:6px;border:1px solid var(--border);
  background:var(--surface2);color:var(--text2);font-size:10px;cursor:pointer;
  transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;font-weight:700;
}
.fsel-btn:hover{border-color:rgba(255,255,255,0.3);}
.fsel-btn.chosen{background:rgba(200,169,110,0.2);border-color:var(--gold);color:var(--gold);}

/* ─── MODAL ─── */
.modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,0.88);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:24px;
}
.modal-ov.hidden{display:none;}
.modal-box{
  background:var(--surface);border:1px solid rgba(200,169,110,0.3);
  border-radius:20px;padding:32px;max-width:420px;width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
.modal-icon{font-size:48px;margin-bottom:12px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--gold);margin-bottom:8px;}
.modal-body{font-size:13px;color:var(--text2);line-height:1.9;margin-bottom:20px;white-space:pre-line;}
.modal-body strong{color:var(--text);}
.modal-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

// ══════ IMAGE HELPERS ══════
const CAT_FOLDER={s:'suspect',t:'tool',m:'motive'};
const CARD_FORMATS=['webm','mp4','gif','png'];

function applyCardMedia(artDiv,folder,name){
  const exts=['webm','mp4','gif','png'];
  let i=0;
  const fb=artDiv.querySelector('.card-fb');
  const existImg=artDiv.querySelector('img.card-img');
  function tryNext(){
    if(i>=exts.length){if(fb)fb.style.display='flex';return;}
    const ext=exts[i++];
    const src=`images/${folder}/${name}.${ext}`;
    const isVideo=['webm','mp4'].includes(ext);
    if(isVideo){
      const vid=document.createElement('video');
      vid.className='card-img';
      vid.autoplay=true;vid.loop=true;vid.muted=true;vid.playsInline=true;
      vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:block;';
      vid.onerror=tryNext;
      vid.oncanplay=()=>{if(existImg)existImg.style.display='none';artDiv.insertBefore(vid,artDiv.firstChild);};
      vid.src=src;
    } else {
      if(existImg){
        const oldErr=existImg.onerror;
        existImg.onerror=tryNext;
        existImg.onload=()=>{existImg.onerror=null;};
        existImg.src=src;
      } else tryNext();
    }
  }
  tryNext();
}

function getCardImg(name, catKey){
  // catKey: 's'|'t'|'m'  or  folder name 'suspect'|'tool'|'motive'
  const folder = CAT_FOLDER[catKey] || catKey;
  return `images/${folder}/${name}.png`;
}

function cardImgEl(name, catKey, w, h){
  // w/h in px — returns <img> that falls back to null on error
  const img = document.createElement('img');
  img.className = 'card-img';
  img.src = getCardImg(name, catKey);
  img.alt = name;
  img.width = w; img.height = h;
  img.onerror = function(){ this.style.display='none'; };
  return img;
}

function tileImgEl(type){
  // type: 'adj' | 'noun'
  const img = document.createElement('img');
  img.className = 'tile-bg';
  img.src = `images/${type}/bg.png`;
  img.alt = '';
  img.onerror = function(){ this.style.display='none'; };
  return img;
}

// ══════ CARD VIEWER ══════
function buildCardViewer(){
  // ── 카드 (용의자/도구/동기) — 가로 슬라이드
  const renderCards=(elId,baseList,bigList,folder)=>{
    const el=document.getElementById(elId);
    if(!el)return;
    el.innerHTML='';
    const makeItem=(name,isBig)=>{
      const item=document.createElement('div');
      item.className='cv-card-item';
      item.onclick=()=>openCardModal(name,folder,isBig);

      const thumb=document.createElement('div');
      thumb.className='cv-card-thumb';

      const img=document.createElement('img');
      img.src=`images/${folder}/${name}.png`;
      img.alt=name;
      const fb=document.createElement('div');
      fb.className='cv-card-fb';
      fb.style.cssText='display:none;';
      img.onerror=function(){this.style.display='none';fb.style.display='flex';};
      thumb.appendChild(img);
      thumb.appendChild(fb);

      if(isBig){
        const badge=document.createElement('div');
        badge.className='cv-card-badge big-badge';
        badge.textContent='BIG';
        thumb.appendChild(badge);
      }
      item.appendChild(thumb);

      el.appendChild(item);
    };
    baseList.forEach(n=>makeItem(n,false));
    bigList.forEach(n=>makeItem(n,true));
  };
  renderCards('cv-suspect',SUSPECTS_BASE,SUSPECTS_BIG,'suspect');
  renderCards('cv-tool',TOOLS_BASE,TOOLS_BIG,'tool');
  renderCards('cv-motive',MOTIVES_BASE,MOTIVES_BIG,'motive');

  // ── 타일 (형용사/명사) — 가로 슬라이드
  const makeTileItem=(word,type)=>{
    const item=document.createElement('div');
    item.className='cv-tile-item';

    const thumb=document.createElement('div');
    thumb.className=`cv-tile-thumb ${type}-tile`;

    const bgImg=document.createElement('img');
    bgImg.className='tile-bg';
    bgImg.src=`images/${type}/bg.png`;
    bgImg.alt='';
    bgImg.onerror=function(){this.style.display='none';};
    thumb.appendChild(bgImg);

    const txt=document.createElement('span');
    txt.className='tile-text';
    txt.textContent=word;
    thumb.appendChild(txt);
    item.appendChild(thumb);
    return item;
  };

  const adjEl=document.getElementById('cv-adj');
  if(adjEl){
    adjEl.innerHTML='';
    ADJ.forEach(w=>adjEl.appendChild(makeTileItem(w,'adj')));
  }
  const nounEl=document.getElementById('cv-noun');
  if(nounEl){
    nounEl.innerHTML='';
    NOUN.forEach(w=>nounEl.appendChild(makeTileItem(w,'noun')));
  }
}

function cvTab(type){
  document.querySelectorAll('.cv-tab').forEach((t,i)=>{
    const types=['suspect','tool','motive','adj','noun'];
    t.classList.toggle('active',types[i]===type);
  });
  document.querySelectorAll('.cv-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('cv-'+type).classList.add('active');
};

// ══════ HELPERS ══════
function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pick(a,n){return shuffle(a).slice(0,n);}
function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ── 배경 미디어 자동감지 ──
const BG_FORMATS = ['webm','mp4','gif','png','jpg'];

function setBg(key){
  const container=document.getElementById('bg-container');
  if(!container) return;
  const exts=['webm','mp4','gif','png','jpg'];
  let i=0;
  function tryNext(){
    if(i>=exts.length){container.innerHTML='';return;}
    const ext=exts[i++];
    const src=`images/bg/${key}.${ext}`;
    const isVideo=['webm','mp4'].includes(ext);
    if(isVideo){
      const vid=document.createElement('video');
      vid.className='bg-media';
      vid.autoplay=true;vid.loop=true;vid.muted=true;vid.playsInline=true;
      vid.onerror=tryNext;
      vid.oncanplaythrough=()=>{container.innerHTML='';container.appendChild(vid);};
      vid.src=src;
      vid.load();
    } else {
      const img=document.createElement('img');
      img.className='bg-media';img.alt='';
      img.onerror=tryNext;
      img.onload=()=>{container.innerHTML='';container.appendChild(img);};
      img.src=src;
    }
  }
  tryNext();
}

// 초기 배경 로드
function selP(n){
  G.pc=n;
  setBg(`${n}p`);
  document.querySelectorAll('.pbtn').forEach(b=>{b.classList.toggle('sel',parseInt(b.textContent)===n);});
  const useAcc=n>=4;
  document.getElementById('acc-notice').style.display=useAcc?'block':'none';
  // role preview
  const roles=getRoles(n);
  const counts={소설가:0,공범:0,탐정:0};
  roles.forEach(r=>counts[r]++);
  const rp=document.getElementById('role-preview');
  rp.style.display='flex';
  rp.innerHTML=`
    <span class="role-chip novelist">📖 소설가 ${counts.소설가}명</span>
    ${counts.공범?`<span class="role-chip accomplice">🕶️ 공범 ${counts.공범}명</span>`:''}
    <span class="role-chip detective">🔍 탐정 ${counts.탐정}명</span>
  `;
  const sb=document.getElementById('sbtn');
  sb.classList.add('ready');
}

function getRoles(n){
  const roles=['소설가'];
  if(n>=4)roles.push('공범');
  const det=n-(n>=4?2:1);
  for(let i=0;i<det;i++)roles.push('탐정');
  return roles;
}

// ══════ START ══════
function startGame(){
  if(!G.pc)return;
  const n=G.pc;
  G.useAcc=n>=4;
  G.roles=shuffle(getRoles(n));
  G.ri=0;
  G.edition='big';

  // 항상 빅박스 전체 풀 사용
  const suspectPool=[...SUSPECTS_BASE,...SUSPECTS_BIG];
  const toolPool   =[...TOOLS_BASE,...TOOLS_BIG];
  const motivePool =[...MOTIVES_BASE,...MOTIVES_BIG];

  // 게임당 9장씩 사용
  const sus=pick(suspectPool,9),tls=pick(toolPool,9),mts=pick(motivePool,9);
  // 정답 = 가장 아래 카드 (index 8)
  G.ans={s:sus[8],t:tls[8],m:mts[8]};
  G.sus=sus;G.tls=tls;G.mts=mts;

  // tiles: 8 adj + 8 noun from bags
  G.adjPool=pick(ADJ,8);
  G.nounPool=pick(NOUN,8);
  G.usedAdj=[];
  G.usedNoun=[];

  // hint state: each category can have up to 4 hint pairs (adj+noun), placed next to specific cards
  // hints[type] = [{adj, noun, card}]  (card for display reference)
  G.hints={s:[],t:[],m:[],a:[]};

  // token state
  // excludeTokens: which cards have [제외] tokens on them (탐정이 배치)
  G.excludeTokens={s:{},t:{},m:{}}; // card -> count
  // deduceTokens: which cards have [추리] tokens (탐정이 배치)
  G.deduceTokens={s:null,t:null,m:null}; // final answer guess
  // accDeduceTokens (공범의 6장 제외 추리)
  G.accExcludeCards=[];

  // eliminated cards (confirmed not answer after successful exclude)
  G.elimS=[];G.elimT=[];G.elimM=[];

  // fail tokens
  G.fail=0;
  G.maxFail=4; // 4 추리 tokens; each fail flips one to 실패

  G.round=1;
  G.phase='hint'; // hint | exclude | deduce | final
  G.selAdj=null;G.selNoun=null;G.selHintTarget=null; // target = 's','t','m','a'

  // acc extra hint (공범 힌트는 [소설가 카드] 옆에 배치됨 - 별도 슬롯)
  // 공범 자신에 대한 힌트를 소설가가 소설가 카드 옆에 배치

  showScr('role-screen');
  showRole();
}

  const role=G.roles[i];
  document.getElementById('role-step').textContent=`플레이어 ${i+1} / ${G.pc}`;
  
  let html='';
  if(role==='소설가'){
    html=`<div class="role-card" style="--accent-color:#5a9fd4;">
      <div class="role-card-img">
        <img src="images/role/소설가.png" alt="소설가" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="role-img-fb" style="display:none;">📖</div>
      </div>

        🔒 이번 사건의 정답 <span style="font-size:9px;color:var(--text3);">(탭하여 확인)</span>
      </div>
    </div>`;
  } else if(role==='공범'){
    // 공범은 소설가를 제외한 나머지 플레이어 중 한 명의 직업을 받음
    // 실제로는 카드를 뽑아 직업이 정해짐 — 여기서는 용의자 중 하나를 공범의 cover로 배정
    if(!G.accOccupation){
      G.accOccupation=G.sus[Math.floor(Math.random()*9)];
    }
    html=`<div class="role-card" style="--accent-color:#a070d0;">
      <div class="role-card-img">
        <img src="images/role/공범.png" alt="공범" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="role-img-fb" style="display:none;">🕶️</div>
      </div>
      <div class="role-desc">당신은 살인범의 공범입니다.<br>탐정들의 추리를 틀린 방향으로<br>유도하여 방해하세요.</div>
      <div class="role-secret" onclick="openAnswerPopup()" style="cursor:pointer;">
        🔒 이번 사건의 정답 <span style="font-size:9px;color:var(--text3);">(탭하여 확인)</span>
      </div>
      <div class="role-occupation" onclick="openOccupationPopup('${G.accOccupation}')" style="cursor:pointer;">
        🎭 위장 직업 <span style="font-size:9px;color:var(--text3);">(탭하여 확인)</span>
      </div>
    </div>`;
  } else {
    html=`<div class="role-card" style="--accent-color:#c8a96e;">
      <div class="role-card-img">
        <img src="images/role/탐정.png" alt="탐정" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="role-img-fb" style="display:none;">🔍</div>
      </div>
      <div class="role-desc">소설가의 다잉 메세지를 분석하여<br>범인, 살해 도구, 살해 동기를<br>모두 맞추세요!</div>

// ══════ GAME INIT ══════
function beginGame(){
  showScr('game-screen');
  if(G.useAcc){
    document.getElementById('acc-row-section').style.display='flex';
    document.getElementById('hps-acc-section').style.display='flex';
  }
  renderAll();
  showModal('📖','소설가에게',
    '지금부터 <strong>소설가는 절대 말할 수 없습니다.</strong>\n\n카드 그림을 보고 연상되는 단어를\n타일로만 힌트를 전달하세요.\n\n탐정들은 눈을 감아주세요! 👀',
    [{l:'힌트 배치 시작',c:'btn-gold',a:'close'}]);
}

// ══════ RENDER ALL ══════
function renderAll(){
  renderHeader();
  renderCards();
  renderHintPanel();
  renderBottomPanel();
}

function renderHeader(){
  document.getElementById('round-badge').textContent=`${G.round}라운드`;
  const eb=document.getElementById('edition-badge');
  if(eb)eb.textContent=G.edition==='big'?'📦 빅박스':'📖 기본판';
  const pb=document.getElementById('phase-badge');
  const phases={
    hint:{label:'소설가 힌트 배치',cls:'phase-hint'},
    exclude:{label:'탐정 제외 선택',cls:'phase-exclude'},
    deduce:{label:'최종 추리',cls:'phase-final'},
  };
  const p=phases[G.phase]||{label:G.phase,cls:'phase-hint'};
  pb.textContent=p.label;pb.className='phase-badge '+p.cls;

  // fail tokens
  const ft=document.getElementById('fail-tokens');
  let html='';
  for(let i=0;i<G.maxFail;i++){
    html+=`<div class="fail-tok${i<G.fail?' used':''}">
      ${i<G.fail?'✕':'●'}
    </div>`;
  }
  ft.innerHTML=html;

  const info=document.getElementById('header-info');
  if(G.phase==='exclude'){
    const totalExcl=Object.values(G.excludeTokens.s).reduce((a,b)=>a+b,0)
      +Object.values(G.excludeTokens.t).reduce((a,b)=>a+b,0)
      +Object.values(G.excludeTokens.m).reduce((a,b)=>a+b,0);
    info.textContent=`제외 토큰: ${totalExcl}/6`;
  } else info.textContent='';
}

function renderCards(){
  renderRow('suspect-row',G.sus,G.elimS,'s');
  renderRow('tool-row',G.tls,G.elimT,'t');
  renderRow('motive-row',G.mts,G.elimM,'m');
  if(G.useAcc)renderAccRow();
}

function renderRow(rowId,cards,elim,type){
  const row=document.getElementById(rowId);
  row.innerHTML='';
  const badgeCls={s:'badge-s',t:'badge-t',m:'badge-m'}[type];
  const typeLabel={s:'용의자',t:'도구',m:'동기'}[type];

  cards.forEach(card=>{
    const isElim=elim.includes(card);
    const exclCount=G.excludeTokens[type][card]||0;
    const isDeduce=G.deduceTokens[type]===card;
    
    let cls='gcard';
    if(isElim)cls+=' elim';
    else if(isDeduce)cls+=' has-deduce';
    else if(exclCount>0)cls+=' has-exclude';
    
    // clickable logic
    let clickable=!isElim;

    // hint pairs for this card's type (show all hints for this row)
    const rowHints=G.hints[type]||[];
    const hintsHtml=rowHints.length?`<div class="gcard-hints">${rowHints.map(h=>`<div class="hint-pair"><span class="hint-word">${h.adj}</span><span class="hint-word">${h.noun}</span></div>`).join('')}</div>`:'';

    // token overlays
    let tokHtml='';
    const toks=[];
    for(let i=0;i<exclCount;i++)toks.push(`<div class="mini-tok excl">✕</div>`);
    if(isDeduce)toks.push(`<div class="mini-tok ded">추</div>`);
    if(toks.length)tokHtml=`<div class="card-tokens-overlay">${toks.join('')}</div>`;

    const d=document.createElement('div');
    d.className=cls;
    // art div — image + fallback emoji
    const artDiv=document.createElement('div');
    artDiv.className='gcard-art';
    // 이미지 — 없으면 카드명 텍스트만 표시
    const cImg=document.createElement('img');
    cImg.className='card-img';
    cImg.src=`images/${({s:'suspect',t:'tool',m:'motive'})[type]}/${card}.png`;
    cImg.alt=card;
    cImg.onerror=function(){
      this.style.display='none';
      fbSpan.style.display='flex';
    };
    artDiv.appendChild(cImg);
    const fbSpan=document.createElement('div');
    fbSpan.className='card-fb';
    fbSpan.style.display='none';
    fbSpan.innerHTML=`<span style="font-size:11px;color:var(--text2);">${card}</span>`;
    artDiv.appendChild(fbSpan);
    const badge=document.createElement('div');
    badge.className=`gcard-badge ${badgeCls}`;
    badge.textContent=typeLabel;
    artDiv.appendChild(badge);
    d.appendChild(artDiv);
    d.innerHTML+=`${hintsHtml}${tokHtml}`;
    if(clickable)d.onclick=()=>onCardClick(card,type);
    row.appendChild(d);
  });
}

function renderAccRow(){
  // 공범 행 — 소설가 카드 옆에 배치된 공범 힌트를 보여주는 별도 행
  // 실제 게임에서 공범은 용의자 카드를 받아 용의자 행에 섞임
  // 여기서는 공범 힌트 슬롯만 표시
  document.getElementById('acc-row').innerHTML=`
    <div style="font-size:10px;color:var(--purple);padding:8px;line-height:1.7;">
      공범 힌트는 오른쪽 패널의<br><strong style="color:var(--purple);">공범 힌트</strong> 슬롯을 확인하세요
    </div>
  `;
}

function renderHintPanel(){
  renderHintSlots('hps-s',G.hints.s,'s');
  renderHintSlots('hps-t',G.hints.t,'t');
  renderHintSlots('hps-m',G.hints.m,'m');
  if(G.useAcc)renderHintSlots('hps-a',G.hints.a,'a');
}

function renderHintSlots(id,hints,type){
  const el=document.getElementById(id);
  if(!el)return;
  const isAcc=type==='a';
  const max=4;
  let html='';
  for(let i=0;i<max;i++){
    const h=hints[i];
    if(h){
      // 확정된 힌트 — 클릭하면 취소
      const adjHtml=`<div class="cv-tile-thumb adj-tile" onclick="removeHintSlot('${type}',${i})" style="cursor:pointer;flex-shrink:0;" title="취소"><img class="tile-bg" src="images/adj/bg.png" onerror="this.style.display='none'"><span class="tile-text">${h.adj}</span></div>`;
      const nounHtml=`<div class="cv-tile-thumb noun-tile" onclick="removeHintSlot('${type}',${i})" style="cursor:pointer;flex-shrink:0;" title="취소"><img class="tile-bg" src="images/noun/bg.png" onerror="this.style.display='none'"><span class="tile-text">${h.noun}</span></div>`;
      html+=`<div class="hp-slot${isAcc?' acc':''} filled" style="display:flex;gap:3px;padding:3px;align-items:center;">${adjHtml}${nounHtml}</div>`;

    } else {
      html+=`<div class="hp-slot empty">·</div>`;
    }
  }
  el.innerHTML=html;
}

function removeHintSlot(type,idx){
  if(G.phase!=='hint')return;
  const pair=G.hints[type][idx];
  if(!pair)return;
  G.usedAdj=G.usedAdj.filter(t=>t!==pair.adj);
  G.usedNoun=G.usedNoun.filter(t=>t!==pair.noun);
  G.hints[type].splice(idx,1);
  renderHintSlots('hps-s',G.hints.s,'s');
  renderHintSlots('hps-t',G.hints.t,'t');
  renderHintSlots('hps-m',G.hints.m,'m');
  if(G.useAcc)renderHintSlots('hps-a',G.hints.a,'a');
  renderBottomPanel();
}

// ══════ CARD CLICK ══════
function onCardClick(card,type){
  if(G.phase==='hint'){
    G.selHintTarget=type;
    renderBottomPanel();
  } else if(G.phase==='exclude'){
    const cur=G.excludeTokens[type][card]||0;
    const total=countTotalExclude();
    if(cur>0){
      G.excludeTokens[type][card]=0;
    } else if(total<6){
      G.excludeTokens[type][card]=1;
    }
    renderCards();renderBottomPanel();
  } else if(G.phase==='deduce'){
    G.deduceTokens[type]=G.deduceTokens[type]===card?null:card;
    renderCards();renderBottomPanel();
  }
}

function countTotalExclude(){
  let n=0;
  ['s','t','m'].forEach(tp=>{
    Object.values(G.excludeTokens[tp]).forEach(v=>{n+=v;});
  });
  return n;
}

// ══════ HINT PHASE ══════
function selAdj(t){
  G.selAdj=G.selAdj===t?null:t;
  _refreshSlots();
  if(G.selAdj&&G.selNoun&&G.selHintTarget) placeHint();
  else renderBottomPanel();
}
function selNoun(t){
  G.selNoun=G.selNoun===t?null:t;
  _refreshSlots();
  if(G.selAdj&&G.selNoun&&G.selHintTarget) placeHint();
  else renderBottomPanel();
}
function _refreshSlots(){
  renderHintSlots('hps-s',G.hints.s,'s');
  renderHintSlots('hps-t',G.hints.t,'t');
  renderHintSlots('hps-m',G.hints.m,'m');
  if(G.useAcc)renderHintSlots('hps-a',G.hints.a,'a');
}

function placeHint(){
  const tp=G.selHintTarget;
  if(!tp||!G.selAdj||!G.selNoun)return;
  if((G.hints[tp]||[]).length>=4){
    showModal('⚠️','알림','해당 카테고리에는 이미 힌트가 4개 있습니다.\n(최대 4쌍)',[{l:'확인',c:'btn-dark',a:'close'}]);
    return;
  }
  G.hints[tp].push({adj:G.selAdj,noun:G.selNoun});
  G.usedAdj.push(G.selAdj);
  G.usedNoun.push(G.selNoun);
  G.selAdj=null;G.selNoun=null;
  // 우측 힌트 슬롯 즉시 갱신
  renderHintSlots('hps-s',G.hints.s,'s');
  renderHintSlots('hps-t',G.hints.t,'t');
  renderHintSlots('hps-m',G.hints.m,'m');
  if(G.useAcc)renderHintSlots('hps-a',G.hints.a,'a');
  // 하단 패널 갱신 (카드 전체 리렌더 없이)
  renderBottomPanel();
}

function endHintPhase(){
  G.phase='exclude';
  G.excludeTokens={s:{},t:{},m:{}};
  renderAll();
  showModal('🔍','탐정들에게',
    '소설가의 힌트 배치가 완료됐습니다!\n<strong>소설가는 이제 화면을 탐정에게 넘겨주세요.</strong>\n\n─────────────────\n\n탐정들은 힌트를 분석해\n관련 없다고 생각되는 카드를 클릭해\n<strong>[제외] 토큰 6개</strong>를 배치하세요.\n\n⚠️ 정답 카드가 포함되면 실패입니다!',
    [{l:'추리 시작!',c:'btn-gold',a:'close'}]);
}

// ══════ EXCLUDE PHASE ══════
function submitExclude(){
  const total=countTotalExclude();
  if(total!==6){return;}

  // check if answer cards are excluded
  const exclS=Object.keys(G.excludeTokens.s).filter(c=>G.excludeTokens.s[c]>0);
  const exclT=Object.keys(G.excludeTokens.t).filter(c=>G.excludeTokens.t[c]>0);
  const exclM=Object.keys(G.excludeTokens.m).filter(c=>G.excludeTokens.m[c]>0);

  const hitAns=exclS.includes(G.ans.s)||exclT.includes(G.ans.t)||exclM.includes(G.ans.m);

  if(hitAns){
    // 실패: 추리 토큰 1개 실패
    G.fail++;
    G.excludeTokens={s:{},t:{},m:{}};
    renderHeader();
    if(G.fail>=G.maxFail){
      gameOver(false);return;
    }
    // 소설가 추가 힌트
    G.phase='hint';
    G.round++;
    renderAll();
    showModal('💔','제외 실패!',`정답 카드가 포함되어 있었습니다!\n추리 토큰 1개가 실패로 뒤집힙니다.\n\n소설가가 추가 힌트를 줍니다.\n(각 주머니에서 타일 1개씩 추가)`,[{l:'힌트 추가하기',c:'btn-gold',a:'close'}]);
    addBonusTiles();
  } else {
    // 성공: 제외된 카드들 탈락
    exclS.forEach(c=>{if(!G.elimS.includes(c))G.elimS.push(c);});
    exclT.forEach(c=>{if(!G.elimT.includes(c))G.elimT.push(c);});
    exclM.forEach(c=>{if(!G.elimM.includes(c))G.elimM.push(c);});
    G.excludeTokens={s:{},t:{},m:{}};

    const remS=G.sus.filter(c=>!G.elimS.includes(c)).length;
    const remT=G.tls.filter(c=>!G.elimT.includes(c)).length;
    const remM=G.mts.filter(c=>!G.elimM.includes(c)).length;
    const remTotal=remS+remT+remM;

    // 룰북 기준: 남은 카드가 9장이 되면 최종 추리
    if(remTotal<=9){
      G.phase='deduce';
      G.deduceTokens={s:null,t:null,m:null};
      renderAll();
      showModal('✅','제외 성공!',
        `카드가 ${remTotal}장 남았습니다.\n(용의자 ${remS} / 도구 ${remT} / 동기 ${remM})\n\n이제 최종 추리를 시작합니다!\n범인, 살해 도구, 살해 동기를 선택하세요.`,
        [{l:'최종 추리 시작',c:'btn-gold',a:'close'}]);
    } else {
      // 아직 9장 초과 — 다음 라운드 힌트 추가
      G.round++;
      G.phase='hint';
      addBonusTiles();
      renderAll();
      showModal('✅','제외 성공!',
        `카드가 제거됐습니다!\n남은 카드: ${remTotal}장 (용의자 ${remS} / 도구 ${remT} / 동기 ${remM})\n\n소설가가 추가 힌트를 배치합니다.\n${G.round}라운드 힌트를 확인하세요.`,
        [{l:'계속',c:'btn-gold',a:'close'}]);
    }
  }
}

function addBonusTiles(){
  const ua=ADJ.filter(t=>!G.usedAdj.includes(t)&&!G.adjPool.includes(t));
  const un=NOUN.filter(t=>!G.usedNoun.includes(t)&&!G.nounPool.includes(t));
  if(ua.length)G.adjPool.push(shuffle(ua)[0]);
  if(un.length)G.nounPool.push(shuffle(un)[0]);
}

// ══════ DEDUCE PHASE ══════
function submitDeduce(){
  const f=G.deduceTokens;
  if(!f.s||!f.t||!f.m){
    showModal('⚠️','알림','범인, 도구, 동기를 모두 선택하세요.',[{l:'확인',c:'btn-dark',a:'close'}]);
    return;
  }
  const ok=f.s===G.ans.s&&f.t===G.ans.t&&f.m===G.ans.m;
  if(ok){
    gameOver(true);
  } else {
    G.fail++;
    renderHeader();
    if(G.fail>=G.maxFail){gameOver(false);return;}
    const remain=G.maxFail-G.fail;
    G.deduceTokens={s:null,t:null,m:null};
    renderCards();
    showModal('❌','틀렸습니다!',`추리가 맞지 않습니다.\n추리 토큰 1개 실패.\n남은 기회: ${remain}번\n\n다시 추리하세요!`,[{l:'다시 추리',c:'btn-gold',a:'close'}]);
  }
}

// ══════ GAME OVER ══════
function gameOver(win){
  const isAccWin=!win&&G.useAcc;
  const icon=win?'🎉':(isAccWin?'🕶️':'💀');
  const title=win?'사건 해결!':(isAccWin?'공범의 승리':'추리 실패...');
  const body=`범인: <strong>${G.ans.s}</strong>\n도구: <strong>${G.ans.t}</strong>\n동기: <strong>${G.ans.m}</strong>`;
  showModal(icon,title,body,[{l:'다시 시작',c:'btn-gold',a:'restart'}]);
}

// ══════ BOTTOM PANEL ══════
function renderBottomPanel(){
  const bp=document.getElementById('bp-content');

  if(G.phase==='hint'){
    const adjAvail=G.adjPool.filter(t=>!G.usedAdj.includes(t));
    const nounAvail=G.nounPool.filter(t=>!G.usedNoun.includes(t));
    const canPlace=!!(G.selHintTarget&&G.selAdj&&G.selNoun);

    // 카테고리 버튼 상태
    const cats=[
      {k:'s',label:'용의자',cls:'badge-s'},
      {k:'t',label:'도구',cls:'badge-t'},
      {k:'m',label:'동기',cls:'badge-m'},
      ...(G.useAcc?[{k:'a',label:'공범',cls:''}]:[])
    ];
    const catBtns=cats.map(c=>{
      const count=(G.hints[c.k]||[]).length;
      const isSel=G.selHintTarget===c.k;
      const full=count>=4;
      return `<button
        onclick="G.selHintTarget='${c.k}';renderBottomPanel();"
        style="padding:5px 10px;border-radius:8px;border:1.5px solid ${isSel?'var(--gold)':full?'var(--border)':'var(--border)'};
               background:${isSel?'rgba(200,169,110,0.15)':'var(--surface2)'};
               color:${isSel?'var(--gold)':full?'var(--text3)':'var(--text)'};
               font-size:11px;cursor:pointer;font-family:inherit;font-weight:${isSel?700:400};">
        ${c.label} <span style="color:${full?'var(--text3)':'var(--gold)'}">${count}/4</span>
      </button>`;
    }).join('');

    // 단계 안내
    const step = !G.selHintTarget ? '① 아래에서 힌트를 붙일 카테고리를 선택하세요'
                : !G.selAdj        ? '② 형용사 타일을 선택하세요'
                : !G.selNoun       ? '③ 명사 타일을 선택하세요'
                :                    '✓ 배치 버튼을 눌러 힌트를 확정하세요';

    bp.innerHTML=`
      <div style="background:rgba(90,159,212,0.08);border:1px solid rgba(90,159,212,0.2);border-radius:8px;padding:6px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;">
        <span style="font-size:14px;">📖</span>
        <span style="font-size:10px;color:#80b0e0;line-height:1.5;">
          <strong>소설가만 조작하세요</strong> — 지금부터 소설가는 절대 말할 수 없습니다. 오직 타일 배치로만 힌트를 전달하세요.
        </span>
      </div>
      <div class="bp-row" style="margin-bottom:6px;gap:6px;flex-wrap:wrap;">
        <span class="bp-title">힌트 배치 (${G.round}라운드)</span>
        ${catBtns}
        <button class="btn btn-blue" style="margin-left:auto;" onclick="endHintPhase()">힌트 완료 →</button>
      </div>
      <div class="tiles-row" style="margin-bottom:4px;">
        <span class="tile-label">형용사</span>
        ${adjAvail.map(t=>`<div class="cv-tile-thumb adj-tile${G.selAdj===t?' sel':''}" onclick="selAdj('${t}')" style="cursor:pointer;flex-shrink:0;"><img class="tile-bg" src="images/adj/bg.png" onerror="this.style.display='none'"><span class="tile-text">${t}</span></div>`).join('')}
        ${G.usedAdj.map(t=>`<div class="cv-tile-thumb adj-tile" style="opacity:0.3;flex-shrink:0;"><img class="tile-bg" src="images/adj/bg.png" onerror="this.style.display='none'"><span class="tile-text">${t}</span></div>`).join('')}
      </div>
      <div class="tiles-row" style="margin-bottom:6px;">
        <span class="tile-label">명사</span>
        ${nounAvail.map(t=>`<div class="cv-tile-thumb noun-tile${G.selNoun===t?' sel':''}" onclick="selNoun('${t}')" style="cursor:pointer;flex-shrink:0;"><img class="tile-bg" src="images/noun/bg.png" onerror="this.style.display='none'"><span class="tile-text">${t}</span></div>`).join('')}
        ${G.usedNoun.map(t=>`<div class="cv-tile-thumb noun-tile" style="opacity:0.3;flex-shrink:0;"><img class="tile-bg" src="images/noun/bg.png" onerror="this.style.display='none'"><span class="tile-text">${t}</span></div>`).join('')}
      </div>
      <div class="bp-row">
        <span class="bp-msg" style="font-size:11px;color:${canPlace?'var(--gold)':'var(--text3)'};">${step}</span>
      </div>
    `;

  } else if(G.phase==='exclude'){
    const total=countTotalExclude();
    bp.innerHTML=`
      <div class="bp-row">
        <span class="bp-title">제외 토큰 배치</span>
        <span class="bp-msg">관련 없다고 생각되는 카드를 클릭하세요. 다시 클릭하면 취소됩니다.</span>
        <span style="font-size:13px;color:var(--gold);font-weight:700;">${total} / 6</span>
        <button class="btn btn-gold" onclick="submitExclude()" ${total===6?'':'disabled'}>제외 확정 →</button>
      </div>
    `;

  } else if(G.phase==='deduce'){
    const remS=G.sus.filter(c=>!G.elimS.includes(c));
    const remT=G.tls.filter(c=>!G.elimT.includes(c));
    const remM=G.mts.filter(c=>!G.elimM.includes(c));
    const ready=G.deduceTokens.s&&G.deduceTokens.t&&G.deduceTokens.m;
    bp.innerHTML=`
      <div class="bp-title" style="margin-bottom:6px;">최종 추리 — 범인, 도구, 동기를 선택하세요</div>
      <div class="final-rows">
        <div class="final-row">
          <span class="final-cat">범인</span>
          ${remS.map(c=>`<button class="fsel-btn${G.deduceTokens.s===c?' chosen':''}" onclick="G.deduceTokens.s='${c}';renderCards();renderBottomPanel();">${c}</button>`).join('')}
        </div>
        <div class="final-row">
          <span class="final-cat">도구</span>
          ${remT.map(c=>`<button class="fsel-btn${G.deduceTokens.t===c?' chosen':''}" onclick="G.deduceTokens.t='${c}';renderCards();renderBottomPanel();">${c}</button>`).join('')}
        </div>
        <div class="final-row">
          <span class="final-cat">동기</span>
          ${remM.map(c=>`<button class="fsel-btn${G.deduceTokens.m===c?' chosen':''}" onclick="G.deduceTokens.m='${c}';renderCards();renderBottomPanel();">${c}</button>`).join('')}
        </div>
        <div class="bp-row" style="margin-top:4px;">
          <span class="bp-msg" style="font-size:10px;">${ready?'✓ 준비 완료 — 제출하세요':'범인, 도구, 동기를 모두 선택하세요'}</span>
          <button class="btn btn-gold" onclick="submitDeduce()" ${ready?'':'disabled'}>최종 추리 제출!</button>
        </div>
      </div>
    `;
  }
}

// ══════ MODAL ══════
function showModal(icon,title,body,btns){
  document.getElementById('m-icon').textContent=icon;
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-body').innerHTML=body;
  document.getElementById('m-btns').innerHTML=btns.map(b=>
    `<button class="btn ${b.c}" onclick="mAct('${b.a}')">${b.l}</button>`
  ).join('');
  document.getElementById('modal').classList.remove('hidden');
}

function mAct(a){
  document.getElementById('modal').classList.add('hidden');
  if(a==='close')return;
  if(a==='restart'){
    G={};
    document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('sel'));
    document.getElementById('sbtn').classList.remove('ready');
    document.getElementById('role-preview').style.display='none';
    document.getElementById('acc-notice').style.display='none';
    showScr('title-screen');
  }
}
</script>
<script>
document.addEventListener('DOMContentLoaded',()=>setBg('default'));
</script>
</body>
</html>
